# Reaction-Diffusion Systems - Chemical pattern formation
# Turing patterns, BZ reactions, Gray-Scott, Schnakenberg, FitzHugh-Nagumo

turing_patterns:
  context: Activator-inhibitor diffusion instability generating stable spatial patterns (spots, stripes, labyrinths) from homogeneous initial conditions.
  glsl_relevance: high # texture synthesis, organic pattern generation
  related: [morphogenesis, instability, diffusion, chemical_waves]
  tags: [pattern_formation, pde, biological]

belousov_zhabotinsky:
  context: Excitable chemical medium exhibiting oscillating redox reactions with propagating spiral/target waves.
  glsl_relevance: high # procedural animation, cyclic textures
  related: [reaction_diffusion, excitable_media, chemical_oscillator, spiral_waves]
  tags: [chemistry, nonlinear_dynamics, waves]

oregonator_model:
  context: Simplified kinetic model of BZ reaction; three-variable ODE system capturing oscillatory behavior.
  glsl_relevance: medium # simulation backend
  related: [bz_reaction, chemical_kinetics, limit_cycle]
  tags: [model, ode, chemistry]

gray_scott_model:
  context: Two-component reaction-diffusion system exhibiting spot replication, stripe formation, and chaotic dynamics.
  glsl_relevance: high # standard GLSL pattern generation
  related: [turing_patterns, reaction_diffusion, spot_formation]
  tags: [pde, simulation, patterns]

schnakenberg_model:
  context: Cross-diffusion reaction scheme producing subcritical bifurcations, hysteresis, and geometry-shifting grids (rolls→hexagons).
  glsl_relevance: medium # advanced pattern transitions
  related: [turing_patterns, cross_diffusion, bifurcation]
  tags: [pde, chemical_dynamics]

fitzhugh_nagumo:
  context: Excitable system modeling nerve impulse propagation; simplified Hodgkin-Huxley dynamics.
  glsl_relevance: medium # wave propagation simulations
  related: [excitable_media, nerve_impulse, reaction_diffusion]
  tags: [biology, pde, waves]
